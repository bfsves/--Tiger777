<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger777</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

#loading{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#fff;
    font-size:18px;
    font-family:Arial;
}
</style>
</head>
<body>

<div id="loading">กำลังโหลด...</div>

<iframe
    id="frame"
    src="https://oipipath.store/la"
    allowfullscreen
></iframe>

<script>
const frame = document.getElementById('frame');
const loading = document.getElementById('loading');

frame.onload = () => {
    loading.style.display = 'none';
};

setTimeout(() => {
    loading.innerHTML =
        'หากหน้าเว็บไม่แสดงผล แสดงว่าเว็บไซต์ปลายทางไม่อนุญาตให้เปิดผ่าน iframe';
}, 5000);
</script>

</body>
</html>
